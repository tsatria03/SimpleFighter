[command]

command_console=SLASH:press

[interaction]

interact=RETURN:press
aircraft_land=L:press
vehicle_horn=LSHIFT+SPACE:press,RSHIFT+SPACE:press
aircraft_dir_left=LSHIFT+LEFT:repeat,RSHIFT+LEFT:repeat
aircraft_dir_right=LSHIFT+RIGHT:repeat,RSHIFT+RIGHT:repeat
aircraft_dir_forward=LSHIFT+UP:repeat,RSHIFT+UP:repeat
aircraft_dir_backward=LSHIFT+DOWN:repeat,RSHIFT+DOWN:repeat

[movement]

move_left=LEFT:press
move_right=RIGHT:press
move_down=DOWN:press
move_up=UP:press
move_pgdown=PAGEDOWN:press
move_pgup=PAGEUP:press
move_pgdown_3d=S:press
move_pgup_3d=W:press
move_left_held=LEFT:down
move_right_held=RIGHT:down
move_down_held=DOWN:down
move_up_held=UP:down
move_pgdown_held=PAGEDOWN:down
move_pgup_held=PAGEUP:down
move_pgdown_3d_held=S:down
move_pgup_3d_held=W:down

[rotation]

rotate_left=Q:press
rotate_right=E:press

[facing]

face_left=LALT+LSHIFT+LEFT:press,LALT+RSHIFT+LEFT:press,RALT+LSHIFT+LEFT:press,RALT+RSHIFT+LEFT:press
face_right=LALT+LSHIFT+RIGHT:press,LALT+RSHIFT+RIGHT:press,RALT+LSHIFT+RIGHT:press,RALT+RSHIFT+RIGHT:press
face_backward=LALT+LSHIFT+DOWN:press,LALT+RSHIFT+DOWN:press,RALT+LSHIFT+DOWN:press,RALT+RSHIFT+DOWN:press
face_forward=LALT+LSHIFT+UP:press,LALT+RSHIFT+UP:press,RALT+LSHIFT+UP:press,RALT+RSHIFT+UP:press
face_down=LALT+LSHIFT+PAGEDOWN:press,LALT+RSHIFT+PAGEDOWN:press,RALT+LSHIFT+PAGEDOWN:press,RALT+RSHIFT+PAGEDOWN:press,LALT+LSHIFT+S:press,LALT+RSHIFT+S:press,RALT+LSHIFT+S:press,RALT+RSHIFT+S:press
face_up=LALT+LSHIFT+PAGEUP:press,LALT+RSHIFT+PAGEUP:press,RALT+LSHIFT+PAGEUP:press,RALT+RSHIFT+PAGEUP:press,LALT+LSHIFT+W:press,LALT+RSHIFT+W:press,RALT+LSHIFT+W:press,RALT+RSHIFT+W:press

[jump]

jump=SPACE:press
jump_held=SPACE:down

[draw]

weapons_menu=LALT+W:press,RALT+W:press
shields_menu=LALT+S:press,RALT+S:press

[spier]

spy_left=LSHIFT+LEFT:press,RSHIFT+LEFT:press
spy_right=LSHIFT+RIGHT:press,RSHIFT+RIGHT:press
spy_down=LSHIFT+DOWN:press,RSHIFT+DOWN:press
spy_up=LSHIFT+UP:press,RSHIFT+UP:press
spy_pgup=LSHIFT+W:press,RSHIFT+W:press,LSHIFT+PAGEUP:press,RSHIFT+PAGEUP:press
spy_pgdown=LSHIFT+S:press,RSHIFT+S:press,LSHIFT+PAGEDOWN:press,RSHIFT+PAGEDOWN:press

[camera]

camera_dexterity_toggle=Y:repeat
camera_mark_left=J:press
camera_mark_right=L:press
camera_mark_back=K:press
camera_mark_front=I:press
camera_mark_bottom_3d=LSHIFT+K:press,RSHIFT+K:press
camera_mark_top_3d=LSHIFT+I:press,RSHIFT+I:press
camera_view_markers=SEMICOLON:press
camera_clear_markers=APOSTROPHE:press
camera_describe=R:press
camera_mfc_toggle=M:repeat
camera_playback=T:repeat

[combat]

fire_auto=LCTRL:down,RCTRL:down
fire_manual=LCTRL:press,RCTRL:press
ammo_check=X:press
reload=R:press
weapon_reflection_toggle=T:press

[hook]

hook_forward=F:press
hook_back=V:press

[speed]

speed_up=LSHIFT+D:repeat,RSHIFT+D:repeat
speed_down=LSHIFT+A:repeat,RSHIFT+A:repeat
speed_reset=LSHIFT+F:press,RSHIFT+F:press

[jump_height]

jump_height_down=F1:repeat
jump_height_up=F2:repeat
jump_height_reset=F3:press

[inventory]

inventory_open=LALT+I:press,RALT+I:press
inventory_cycle=TAB:repeat
inventory_cycle_back=LSHIFT+TAB:repeat,RSHIFT+TAB:repeat
item_use=LSHIFT+RETURN:repeat,RSHIFT+RETURN:repeat
item_drop=LSHIFT+LEFTBRACKET:repeat,RSHIFT+LEFTBRACKET:repeat

[menus]

build_menu=B:press
edit_menu=U:press
combat_log=LSHIFT+LALT+E:press,LSHIFT+RALT+E:press,RSHIFT+LALT+E:press,RSHIFT+RALT+E:press
objects_info_menu=LALT+E:press,RALT+E:press
shop_menu=LSHIFT+V:press,RSHIFT+V:press
pause=P:press
quit=ESCAPE:press

[healing]

heal_self=BACKSLASH:repeat
heal_shield=RIGHTBRACKET:repeat
shield_toggle=O:repeat
shield_release=O:release

[sonar]

sonar_cycle_follow=LSHIFT+F1:press,RSHIFT+F1:press
sonar_cycle_mode=LSHIFT+F2:press,RSHIFT+F2:press
sonar_cycle_speed=LSHIFT+F3:press,RSHIFT+F3:press
sonar_left=J:press
sonar_right=L:press
sonar_back=K:press
sonar_front=I:press
sonar_up_3d=LSHIFT+I:press,RSHIFT+I:press
sonar_down_3d=LSHIFT+K:press,RSHIFT+K:press

[info]

info_coords=C:press
info_zone=LALT+Q:press,RALT+Q:press
info_health=H:press
info_stamina=Y:press
info_shield=M:press
info_kills=LEFTBRACKET:press
help=LSHIFT+H:press,RSHIFT+H:press

[tracking]

tracking_stop=LSHIFT+N:press,RSHIFT+N:press
tracking_speak=N:press

[misc]

zones_spoken_toggle=Z:press
