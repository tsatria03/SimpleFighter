# SimpleFighter keyboard bindings
# Format: action=KEY  or  action=MOD+KEY  or  action=MOD+KEY:trigger
# Triggers: press (default), down, release, repeat, up
# Section headers are decorative — key_config reads every action regardless of section.
# Modifier shorthand: ALT, SHIFT, CTRL, GUI expand to both left/right variants.
# Use LALT/RALT/LSHIFT/... only if you want a specific side.

[command]

command_console=SLASH

[interaction]
# Activation key used at doors, travelpoints, elevators, passages, menu/story zones,
# calendars, and to board vehicles/bikes/aircraft.
interact=RETURN
# Aircraft landing key (held by the script's plane-tile gate).
aircraft_land=L
# Vehicle/bike horn or bell (the script chooses which sound to play).
vehicle_horn=SHIFT+SPACE
# Aircraft heading change (SHIFT+arrow). Plain arrows are speed/altitude.
aircraft_dir_left=SHIFT+LEFT:repeat
aircraft_dir_right=SHIFT+RIGHT:repeat
aircraft_dir_forward=SHIFT+UP:repeat
aircraft_dir_backward=SHIFT+DOWN:repeat

[movement]

move_left=LEFT
move_right=RIGHT
move_down=DOWN
move_up=UP
move_pgdown=PAGEDOWN
move_pgup=PAGEUP
# 3D-mode alternates for vertical movement (script checks mapmode):
move_pgdown_3d=S
move_pgup_3d=W
# Held variants for the auto-repeat step loop:
move_left_held=LEFT:down
move_right_held=RIGHT:down
move_down_held=DOWN:down
move_up_held=UP:down
move_pgdown_held=PAGEDOWN:down
move_pgup_held=PAGEUP:down
move_pgdown_3d_held=S:down
move_pgup_3d_held=W:down

[rotation]

rotate_left=Q
rotate_right=E

[facing]

face_left=ALT+SHIFT+LEFT
face_right=ALT+SHIFT+RIGHT
face_backward=ALT+SHIFT+DOWN
face_forward=ALT+SHIFT+UP
face_down=ALT+SHIFT+PAGEDOWN,ALT+SHIFT+S
face_up=ALT+SHIFT+PAGEUP,ALT+SHIFT+W

[jump]

jump=SPACE
jump_held=SPACE:down

[draw]

weapons_menu=ALT+W
shields_menu=ALT+S

[spier]

spy_left=SHIFT+LEFT
spy_right=SHIFT+RIGHT
spy_down=SHIFT+DOWN
spy_up=SHIFT+UP
spy_pgup=SHIFT+W,SHIFT+PAGEUP
spy_pgdown=SHIFT+S,SHIFT+PAGEDOWN

[camera]
# All camera actions are also gated by G held or camdext mode in the script.
camera_dexterity_toggle=Y:repeat
camera_mark_left=J
camera_mark_right=L
camera_mark_back=K
camera_mark_front=I
camera_mark_bottom_3d=SHIFT+K
camera_mark_top_3d=SHIFT+I
camera_view_markers=SEMICOLON
camera_clear_markers=APOSTROPHE
camera_describe=R
camera_mfc_toggle=M:repeat
camera_playback=T:repeat

[combat]

fire_auto=CTRL:down
fire_manual=CTRL
ammo_check=X
reload=R
weapon_reflection_toggle=T

[hook]

hook_forward=F
hook_back=V

[speed]

speed_up=SHIFT+D:repeat
speed_down=SHIFT+A:repeat
speed_reset=SHIFT+F

[jump_height]

jump_height_down=F1:repeat
jump_height_up=F2:repeat
jump_height_reset=F3

[inventory]

inventory_open=ALT+I
inventory_cycle=TAB:repeat
inventory_cycle_back=SHIFT+TAB:repeat
item_use=SHIFT+RETURN:repeat
item_drop=SHIFT+LEFTBRACKET:repeat

[menus]

build_menu=B
edit_menu=U
combat_log=SHIFT+ALT+E
objects_info_menu=ALT+E
shop_menu=SHIFT+V
pause=P
quit=ESCAPE

[healing]

heal_self=BACKSLASH:repeat
heal_shield=RIGHTBRACKET:repeat
shield_toggle=O:repeat
shield_release=O:release

[sonar]
# Sonar dir keys overlap with camera mark keys — script disambiguates by G/camdext state.
sonar_cycle_follow=SHIFT+F1
sonar_cycle_mode=SHIFT+F2
sonar_cycle_speed=SHIFT+F3
sonar_left=J
sonar_right=L
sonar_back=K
sonar_front=I
sonar_up_3d=SHIFT+I
sonar_down_3d=SHIFT+K

[info]

info_coords=C
info_zone=ALT+Q
info_health=H
info_stamina=Y
info_shield=M
info_kills=LEFTBRACKET
help=SHIFT+H

[tracking]

tracking_stop=SHIFT+N
tracking_speak=N

[misc]

zones_spoken_toggle=Z
